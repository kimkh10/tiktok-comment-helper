<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>TikTok 댓글 도우미</title>
    <style>
      body {
        max-width: 760px;
        margin: 0 auto;
        padding: 24px;
        font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        font-size: 14px;
        color: #1a1a1a;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 16px;
      }
      h2 {
        font-size: 15px;
        margin: 24px 0 8px;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 4px;
      }
      textarea {
        width: 100%;
        box-sizing: border-box;
        height: 220px;
        font-family: inherit;
        font-size: 13px;
        resize: vertical;
        margin-bottom: 10px;
        padding: 8px;
      }
      input[type="text"] {
        width: 260px;
        box-sizing: border-box;
        margin-bottom: 10px;
        padding: 6px;
      }
      button {
        padding: 10px 16px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        margin-right: 8px;
        margin-bottom: 10px;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        margin-bottom: 16px;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 6px 8px;
        text-align: left;
        vertical-align: top;
      }
      .hint {
        color: #777;
      }
      .status-ready {
        background: #eaffea;
      }
      .status-not_found,
      .status-multiple_matches,
      .status-empty_comment,
      .status-invalid_url {
        background: #fff3cd;
      }
      #fatalError {
        display: none;
        background: #fdecea;
        color: #c62828;
        border: 1px solid #f5c2c0;
        padding: 10px;
        margin-bottom: 16px;
        white-space: pre-wrap;
      }
      #stepCard {
        display: none;
        border: 2px solid #1a73e8;
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 20px;
        background: #f4f8ff;
      }
      #stepCard .progress {
        font-weight: 600;
        margin-bottom: 8px;
      }
      #stepCard .stepUrl {
        margin-bottom: 8px;
        word-break: break-all;
      }
      #stepComment {
        width: 100%;
        box-sizing: border-box;
        height: 90px;
        font-family: inherit;
        font-size: 13px;
        padding: 8px;
        margin-bottom: 10px;
      }
      .clipboardNote {
        color: #1a7f37;
        font-weight: 600;
        margin-bottom: 10px;
      }
      #autoStatus {
        margin-bottom: 10px;
        padding: 8px;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      #autoStatus .detail {
        color: #777;
      }
      #log ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      #log li {
        padding: 6px 8px;
        border-bottom: 1px solid #eee;
      }
      .status-confirmed {
        color: #1a7f37;
      }
      .status-skipped {
        color: #9a6700;
      }
    </style>
  </head>
  <body>
    <h1>TikTok 댓글 도우미</h1>
    <p class="hint">
      슬랙 메시지를 붙여넣으면 내 이름의 댓글을 찾아 링크를 순서대로 열고, 댓글 입력과 게시 버튼 클릭까지 자동으로 시도합니다.
      결과(성공/차단/실패)를 직접 확인한 뒤 "확인함 → 다음"을 눌러야 다음 링크로 넘어갑니다. 자동 입력이 안 되는 경우를 대비해
      댓글은 클립보드에도 항상 복사해둡니다.
    </p>

    <div id="fatalError"></div>

    <label for="name">내 이름</label>
    <input type="text" id="name" value="Anthony" />

    <label for="slackText">슬랙 메시지 붙여넣기</label>
    <textarea id="slackText" placeholder="여기에 슬랙 메시지 전체를 붙여넣으세요..."></textarea>

    <div id="preview"></div>

    <button id="startBtn" disabled>진행 시작</button>

    <div id="stepCard">
      <div class="progress" id="stepProgress"></div>
      <div class="stepUrl"><a id="stepLink" href="#" target="_blank"></a></div>
      <label for="stepComment">댓글 내용 (자동 입력에 사용됩니다. 필요하면 여기서 수정 후 "다시 시도"):</label>
      <textarea id="stepComment"></textarea>
      <div class="clipboardNote" id="clipboardNote"></div>
      <div id="autoStatus">대기 중...</div>
      <button id="recopyBtn">다시 복사</button>
      <button id="retryBtn">다시 시도(자동 입력/게시)</button>
      <button id="prevBtn">이전</button>
      <button id="skipBtn">건너뛰기</button>
      <button id="nextBtn">확인함 → 다음</button>
    </div>

    <h2>진행 로그</h2>
    <div id="log"><p class="hint">아직 진행한 항목이 없습니다.</p></div>

    <script src="parser.js"></script>
    <script src="panel.js"></script>
  </body>
</html>
